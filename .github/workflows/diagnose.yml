name: Diagnose Environment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Check Gradle availability
        run: |
          echo "Checking if gradle command exists..."
          which gradle || echo "gradle command not found in PATH"
          echo "Checking for gradlew..."
          ls -la gradlew 2>/dev/null || echo "gradlew not found in current directory"
          echo "Java version:"
          java -version
          echo "Contents of current directory:"
          ls -la
          echo "Checking for build.gradle:"
          ls -la build.gradle 2>/dev/null || echo "build.gradle not found"